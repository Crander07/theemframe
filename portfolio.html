<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | TheEmFrame Photography</title>
<meta name="description" content="Browse photo albums by category: couples, families, events, seniors, and portraits & branding.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<header class="section-tight">
  <div class="container">
    <span class="eyebrow">The Work</span>
    <h1 class="mt-2 mb-2">Portfolio</h1>
    <p class="max-w-prose">A running collection from recent sessions, organized by album. Click any photo for a closer look.</p>
  </div>
</header>

<section class="section-tight">
  <div class="container">
    <div class="filter-bar">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="couples">Couples</button>
      <button class="filter-pill" data-filter="families">Families & Groups</button>
      <button class="filter-pill" data-filter="events">Events</button>
      <button class="filter-pill" data-filter="seniors">Seniors</button>
      <button class="filter-pill" data-filter="portraits">Portraits & Branding</button>
    </div>

    <div class="row g-3" id="portfolio-grid">
      <!-- filled by script.js from js/data.js + any admin uploads -->
    </div>
  </div>
</section>

<!-- ===== Lightbox modal ===== -->
<div class="modal fade lightbox-modal" id="lightboxModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <img id="lightboxImage" src="" alt="">
        <div class="lightbox-caption" id="lightboxCaption"></div>
      </div>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/partials.js"></script>
<script src="js/script.js"></script>
<script>
  // Support ?category=slug deep links coming from the homepage album tiles
  document.addEventListener("DOMContentLoaded", function () {
    var params = new URLSearchParams(window.location.search);
    var cat = params.get("category");
    if (cat) {
      var btn = document.querySelector('.filter-pill[data-filter="' + cat + '"]');
      if (btn) btn.click();
    }
  });
</script>
</body>
</html>
